<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vélo Taf</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="icon-192.png">
</head>
<body style="margin:0; padding:0; height:100vh;">
    <iframe src="https://script.google.com/macros/s/AKfycbyZV60YLn8GXdiZuR51VNaD5WDXaiYr18w4m0-w8ynwNVRun7HF3WvuZ516BnRJ5Ygjjw/exec"
            style="width:100%; height:100%; border:none;">
    </iframe>

    <!-- Service Worker + Notifications -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ Service Worker enregistré'))
                .catch(err => console.log('❌ SW erreur:', err));
        }

        // Demande de permission pour les notifications
        function askNotificationPermission() {
            if (!('Notification' in window)) {
                console.log("Notifications non supportées");
                return;
            }

            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    console.log('✅ Notifications autorisées par l\'utilisateur');
                } else {
                    console.log('❌ Notifications refusées');
                }
            });
        }

        // Demander après le chargement de la page
        window.addEventListener('load', () => {
            setTimeout(askNotificationPermission, 3000);
        });
    </script>
</body>
</html>
