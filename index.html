<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vélo Taf</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="icon-192.png">

    <!-- Firebase SDK (version compatible) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>
</head>
<body style="margin:0; padding:0; height:100vh;">
    <iframe src="https://script.google.com/macros/s/AKfycbyZV60YLn8GXdiZuR51VNaD5WDXaiYr18w4m0-w8ynwNVRun7HF3WvuZ516BnRJ5Ygjjw/exec"
            style="width:100%; height:100%; border:none;">
    </iframe>

    <script>
        // === TON CONFIG FIREBASE ===
        const firebaseConfig = {
          apiKey: "AIzaSyC7zdet_pm9VN6HRF7VDsvoj1jROYtWuVk",
          authDomain: "velo-taf-notif.firebaseapp.com",
          projectId: "velo-taf-notif",
          storageBucket: "velo-taf-notif.firebasestorage.app",
          messagingSenderId: "288912454846",
          appId: "1:288912454846:web:99f7678941e49ba2fadaef"
        };

        // Initialisation Firebase
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // Enregistrement Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('✅ Service Worker enregistré');
                    messaging.useServiceWorker(reg);
                })
                .catch(err => console.log('❌ Erreur SW:', err));
        }

        // Demande de permission notifications
        function askNotificationPermission() {
            messaging.requestPermission()
                .then(() => {
                    return messaging.getToken();
                })
                .then(token => {
                    console.log('🔑 Token FCM :', token);
                    // Tu peux copier ce token pour tester
                })
                .catch(err => {
                    console.log('❌ Erreur notification:', err);
                });
        }

        window.addEventListener('load', () => {
            setTimeout(askNotificationPermission, 4000);
        });
    </script>
</body>
</html>
